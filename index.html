<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Matrix Portrait</title>
  <style>
    html, body {
      margin:0;
      height:100%;
      overflow:hidden;
      background:#ffffff;
    }
    canvas {
      display:block;
      width:100vw;
      height:100vh;
      touch-action:none;
    }
  </style>
</head>
<body>

<script type="module">
import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.182.0/build/three.module.js";

// ---------- Renderer
const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setPixelRatio(Math.min(2, devicePixelRatio));
renderer.setSize(innerWidth, innerHeight);
renderer.setClearColor(0xffffff, 1);
document.body.appendChild(renderer.domElement);

// ---------- Scene / Camera
const scene = new THREE.Scene();
const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);

// ---------- Photo
const photoTex = await new THREE.TextureLoader().loadAsync(
  "https://static.tildacdn.com/tild3630-6130-4336-b734-396338333766/pexels-lepta-studio-.webp"
);
photoTex.colorSpace = THREE.SRGBColorSpace;
photoTex.minFilter = THREE.LinearFilter;
photoTex.magFilter = THREE.LinearFilter;

// ---------- Digits atlas
function makeDigitsAtlasTexture() {
  const chars = "0123456789";
  const grid = 4;
  const cell = 96;

  const c = document.createElement("canvas");
  c.width = grid * cell;
  c.height = grid * cell;
  const ctx = c.getContext("2d");

  ctx.fillStyle = "#ffffff";
  ctx.fillRect(0, 0, c.width, c.height);

  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.font = `700 ${Math.floor(cell*0.78)}px monospace`;
  ctx.fillStyle = "#000000";

  for (let i=0; i<grid*grid; i++){
    const ch = chars[i % chars.length];
    const x = (i % grid) * cell + cell/2;
    const y = Math.floor(i / grid) * cell + cell/2;
    ctx.fillText(ch, x, y);
  }

  const tex = new THREE.CanvasTexture(c);
  tex.colorSpace = THREE.SRGBColorSpace;
  return { tex, grid };
}
const { tex: digitsTex, grid: digitsGrid } = makeDigitsAtlasTexture();

// ---------- Pointer
const mouse = new THREE.Vector2(0.5, 0.5);
let active = 0;

function setPointer(e){
  const r = renderer.domElement.getBoundingClientRect();
  mouse.x = (e.clientX - r.left) / r.width;
  mouse.y = 1.0 - (e.clientY - r.top) / r.height;
}

renderer.domElement.addEventListener("pointermove", setPointer);
renderer.domElement.addEventListener("pointerenter", e => {
  if (e.pointerType === "mouse") active = 1;
});
renderer.domElement.addEventListener("pointerleave", e => {
  if (e.pointerType === "mouse") active = 0;
});
renderer.domElement.addEventListener("pointerdown", e => {
  setPointer(e);
  active = 1;
});
renderer.domElement.addEventListener("pointerup", () => active = 0);
renderer.domElement.addEventListener("pointercancel", () => active = 0);

// ---------- Uniforms
const uniforms = {
  uTime: { value: 0 },
  uRes:  { value: new THREE.Vector2(innerWidth, innerHeight) },
  uPhoto: { value: photoTex },
  uDigits:{ value: digitsTex },
  uGrid:  { value: digitsGrid },

  uCellPx: { value: 10.0 },
  uContrast: { value: 10.0 },
  uInk: { value: 0.03 },

  uHoverInkMul: { value: 0.20 },
  uBrushRadiusPx: { value: 60.0 },
  uScrambleSpeed: { value: 18.0 },

  uMouse: { value: mouse },
  uActive:{ value: 0.0 }
};

const material = new THREE.ShaderMaterial({
  uniforms,
  vertexShader: `
    varying vec2 vUv;
    void main(){
      vUv = uv;
      gl_Position = vec4(position.xy,0.,1.);
    }
  `,
  fragmentShader: `
    precision highp float;
    varying vec2 vUv;

    uniform float uTime;
    uniform vec2 uRes;
    uniform sampler2D uPhoto;
    uniform sampler2D uDigits;
    uniform float uGrid;

    uniform float uCellPx;
    uniform float uContrast;
    uniform float uInk;
    uniform float uHoverInkMul;
    uniform float uBrushRadiusPx;
    uniform float uScrambleSpeed;

    uniform vec2 uMouse;
    uniform float uActive;

    float hash12(vec2 p){
      vec3 p3 = fract(vec3(p.xyx) * 0.1031);
      p3 += dot(p3, p3.yzx + 33.33);
      return fract((p3.x + p3.y) * p3.z);
    }

    float luma(vec3 c){
      return dot(c, vec3(0.2126,0.7152,0.0722));
    }

    void main(){
      vec3 bg = vec3(1.0);

      vec2 frag = vUv * uRes;
      float cell = max(6.0, uCellPx);
      vec2 gid = floor(frag / cell);
      vec2 fuv = fract(frag / cell);

      float p = luma(texture2D(uPhoto, vUv).rgb);
      float mask = smoothstep(0.15, 0.9, 1.0 - p);
      mask = pow(mask, 1.6);

      vec2 mousePx = uMouse * uRes;
      float distPx = distance(frag, mousePx);
      float hover = uActive * step(distPx, uBrushRadiusPx);

      float baseDigit = floor(hash12(gid) * 10.0);
      float steps = floor(uTime * uScrambleSpeed);
      float liveDigit = floor(hash12(gid + vec2(steps, steps*1.37)) * 10.0);
      float digitVal = mix(baseDigit, liveDigit, hover);

      float gx = mod(digitVal, uGrid);
      float gy = floor(digitVal / uGrid);
      vec2 atlasUv = (vec2(gx, gy) + fuv) / uGrid;

      float digit = 1.0 - texture2D(uDigits, atlasUv).r;
      float inkAmount = digit * mask;

      vec3 ink = vec3(uInk);
      vec3 hoverInk = vec3(clamp(uInk * uHoverInkMul, 0.0, 1.0));
      vec3 finalInk = mix(ink, hoverInk, hover);

      vec3 color = mix(bg, finalInk, inkAmount);
      gl_FragColor = vec4(color,1.);
    }
  `
});

scene.add(new THREE.Mesh(new THREE.PlaneGeometry(2,2), material));

// ---------- Resize
addEventListener("resize", () => {
  renderer.setSize(innerWidth, innerHeight);
  uniforms.uRes.value.set(innerWidth, innerHeight);
});

// ---------- Animate
const clock = new THREE.Clock();
renderer.setAnimationLoop(() => {
  uniforms.uTime.value += clock.getDelta();
  uniforms.uActive.value = active ? 1.0 : 0.0;
  renderer.render(scene, camera);
});
</script>

</body>

</html>
