<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Digit 01</title>

<style>
html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  background: #ffffff;
  overflow: hidden;
}

.ds-digit-wrap {
  width: 100vw;
  height: 100vh;
  background: #ffffff;
  overflow: hidden;
}

#dsDigitCanvas {
  width: 100%;
  height: 100%;
  display: block;
}
</style>
</head>

<body>

<div class="ds-digit-wrap">
  <canvas id="dsDigitCanvas"></canvas>
</div>

<script type="module">
import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.182.0/build/three.module.js";

const canvas = document.getElementById("dsDigitCanvas");
const wrap = document.querySelector(".ds-digit-wrap");

const renderer = new THREE.WebGLRenderer({
  canvas,
  antialias: true,
  alpha: false
});

renderer.setPixelRatio(Math.min(2, window.devicePixelRatio));
renderer.setClearColor(0xffffff, 1);

const scene = new THREE.Scene();
const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);

function makeNumberMaskTexture(text = "01") {
  const c = document.createElement("canvas");
  c.width = 1400;
  c.height = 700;

  const ctx = c.getContext("2d");

  ctx.fillStyle = "#ffffff";
  ctx.fillRect(0, 0, c.width, c.height);

  ctx.fillStyle = "#000000";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.font = "900 500px JetBrains Mono, Arial, sans-serif";

  ctx.fillText(text, c.width / 2, c.height / 2 + 20);

  const tex = new THREE.CanvasTexture(c);
  tex.colorSpace = THREE.SRGBColorSpace;
  tex.minFilter = THREE.LinearFilter;
  tex.magFilter = THREE.LinearFilter;

  return tex;
}

function makeDigitsAtlasTexture() {
  const chars = "0123456789";
  const grid = 4;
  const cell = 96;

  const c = document.createElement("canvas");
  c.width = grid * cell;
  c.height = grid * cell;

  const ctx = c.getContext("2d");

  ctx.fillStyle = "#ffffff";
  ctx.fillRect(0, 0, c.width, c.height);

  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.font = `600 ${Math.floor(cell * 0.55)}px JetBrains Mono, monospace`;
  ctx.fillStyle = "#000000";

  for (let i = 0; i < grid * grid; i++) {
    const ch = chars[i % chars.length];
    const x = (i % grid) * cell + cell / 2;
    const y = Math.floor(i / grid) * cell + cell / 2;
    ctx.fillText(ch, x, y);
  }

  const tex = new THREE.CanvasTexture(c);
  tex.colorSpace = THREE.SRGBColorSpace;

  return { tex, grid };
}

const { tex: digitsTex, grid: digitsGrid } = makeDigitsAtlasTexture();

const mouse = new THREE.Vector2(0.5, 0.5);
let active = 0;

function setPointer(e) {
  const r = canvas.getBoundingClientRect();
  mouse.x = (e.clientX - r.left) / r.width;
  mouse.y = 1.0 - (e.clientY - r.top) / r.height;
}

canvas.addEventListener("pointermove", setPointer);
canvas.addEventListener("pointerenter", () => active = 1);
canvas.addEventListener("pointerleave", () => active = 0);

const uniforms = {
  uTime: { value: 0 },
  uRes: { value: new THREE.Vector2(1, 1) },

  uMask: { value: makeNumberMaskTexture("01") },
  uDigits: { value: digitsTex },
  uGrid: { value: digitsGrid },

  uCellPx: { value: 7.0 },
  uContrast: { value: 2.2 },
  uInk: { value: 0.12 },

  uHoverInkMul: { value: 0.22 },
  uBrushRadiusPx: { value: 110.0 },
  uScrambleSpeed: { value: 7.0 },

  uMouse: { value: mouse },
  uActive: { value: 0.0 }
};

const material = new THREE.ShaderMaterial({
  uniforms,
  vertexShader: `
    varying vec2 vUv;

    void main() {
      vUv = uv;
      gl_Position = vec4(position.xy, 0.0, 1.0);
    }
  `,
  fragmentShader: `
    precision highp float;

    varying vec2 vUv;

    uniform float uTime;
    uniform vec2 uRes;

    uniform sampler2D uMask;
    uniform sampler2D uDigits;
    uniform float uGrid;

    uniform float uCellPx;
    uniform float uContrast;
    uniform float uInk;

    uniform float uHoverInkMul;
    uniform float uBrushRadiusPx;
    uniform float uScrambleSpeed;

    uniform vec2 uMouse;
    uniform float uActive;

    float hash12(vec2 p) {
      vec3 p3 = fract(vec3(p.xyx) * 0.1031);
      p3 += dot(p3, p3.yzx + 33.33);
      return fract((p3.x + p3.y) * p3.z);
    }

    float luma(vec3 c) {
      return dot(c, vec3(0.2126, 0.7152, 0.0722));
    }

    void main() {
      vec3 bg = vec3(1.0);

      vec2 frag = vUv * uRes;

      float cell = max(5.0, uCellPx);
      vec2 gid = floor(frag / cell);
      vec2 fuv = fract(frag / cell);

      float p = luma(texture2D(uMask, vUv).rgb);
      float mask = pow(clamp(1.0 - p, 0.0, 1.0), uContrast);

      vec2 mousePx = uMouse * uRes;
      float distPx = distance(frag, mousePx);
      float hover = uActive * smoothstep(uBrushRadiusPx, 0.0, distPx);

      float speed = uScrambleSpeed + hover * 18.0;
      float steps = floor(uTime * speed);

      float baseDigit = floor(hash12(gid) * 10.0);
      float liveDigit = floor(hash12(gid + vec2(steps, steps * 1.37)) * 10.0);

      float animatedCells = step(0.94, hash12(gid * 0.37));

      float digitVal = mix(baseDigit, liveDigit, animatedCells);

      float gx = mod(digitVal, uGrid);
      float gy = floor(digitVal / uGrid);

      vec2 jitter = vec2(
        hash12(gid) * 0.12,
        hash12(gid + 13.7) * 0.12
      );

      vec2 atlasUv = (vec2(gx, gy) + fuv + jitter) / uGrid;

      float digit = 1.0 - texture2D(uDigits, atlasUv).r;

      float randomOpacity = mix(0.45, 1.0, hash12(gid * 2.0));
      float inkAmount = digit * mask * randomOpacity;

      vec3 ink = vec3(uInk);
      vec3 hoverInk = vec3(clamp(uInk * uHoverInkMul, 0.0, 1.0));
      vec3 finalInk = mix(ink, hoverInk, hover);

      vec3 color = mix(bg, finalInk, inkAmount);

      gl_FragColor = vec4(color, 1.0);
    }
  `
});

scene.add(new THREE.Mesh(new THREE.PlaneGeometry(2, 2), material));

function resize() {
  const w = wrap.clientWidth;
  const h = wrap.clientHeight;

  renderer.setSize(w, h, false);
  uniforms.uRes.value.set(w, h);
}

window.addEventListener("resize", resize);
resize();

const clock = new THREE.Clock();

renderer.setAnimationLoop(() => {
  uniforms.uTime.value += clock.getDelta();
  uniforms.uActive.value = active ? 1.0 : 0.0;

  renderer.render(scene, camera);
});
</script>

</body>
</html>
