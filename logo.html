<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1"
  >

  <title>Digital Logo</title>

  <style>
    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
    }

    .logo-wrap {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: transparent;
    }

    #logoCanvas {
      display: block;
      width: 100%;
      height: 100%;
      background: transparent;
    }
  </style>
</head>

<body>

<div class="logo-wrap">
  <canvas id="logoCanvas"></canvas>
</div>

<script>
  const canvas = document.getElementById("logoCanvas");
  const wrap = document.querySelector(".logo-wrap");
  const ctx = canvas.getContext("2d");

  /*
   * Точное имя файла в GitHub.
   * %20 означает пробел.
   */
  const LOGO_URL = "./Group%20143725952.png";

  const SETTINGS = {
    /*
     * Размер сетки такой же,
     * как в рабочем Digit 01.
     */
    cellSize: 7,

    /*
     * Размер самих цифр.
     */
    fontSize: 5,

    fontWeight: 600,

    /*
     * Размер логотипа внутри блока.
     */
    logoScale: 0.9,

    /*
     * Скорость смены цифр.
     */
    scrambleSpeed: 7,

    /*
     * Примерно 6% цифр меняются.
     */
    animatedPercentage: 0.06,

    /*
     * Цвета для чёрного фона.
     */
    grayColor: "#b8b8b8",
    whiteColor: "#ffffff",

    minOpacity: 0.7,
    maxOpacity: 1
  };

  let width = 1;
  let height = 1;
  let dpr = 1;

  let logoImage = null;

  let logoX = 0;
  let logoY = 0;
  let logoWidth = 0;
  let logoHeight = 0;

  let digits = [];
  let lastStep = -1;

  /*
   * Вспомогательный canvas с цифрами.
   */
  const digitsCanvas = document.createElement("canvas");
  const digitsCtx = digitsCanvas.getContext("2d");

  /*
   * Вспомогательный canvas с маской логотипа.
   */
  const maskCanvas = document.createElement("canvas");
  const maskCtx = maskCanvas.getContext("2d");


  function random(min, max) {
    return min + Math.random() * (max - min);
  }


  function randomDigit() {
    return String(Math.floor(Math.random() * 10));
  }


  function loadLogo() {
    return new Promise(function(resolve, reject) {
      const image = new Image();

      image.onload = function() {
        logoImage = image;
        resolve();
      };

      image.onerror = function() {
        reject(
          new Error(
            "Не удалось загрузить файл Group 143725952.png"
          )
        );
      };

      /*
       * Добавляем параметр,
       * чтобы браузер не показывал старую версию.
       */
      image.src = LOGO_URL + "?v=15";
    });
  }


  function calculateLogoSize() {
    const imageAspect =
      logoImage.naturalWidth /
      logoImage.naturalHeight;

    const availableWidth =
      width * SETTINGS.logoScale;

    const availableHeight =
      height * SETTINGS.logoScale;

    logoWidth = availableWidth;
    logoHeight = logoWidth / imageAspect;

    if (logoHeight > availableHeight) {
      logoHeight = availableHeight;
      logoWidth = logoHeight * imageAspect;
    }

    logoX = (width - logoWidth) / 2;
    logoY = (height - logoHeight) / 2;
  }


  function createMask() {
    maskCtx.clearRect(
      0,
      0,
      width,
      height
    );

    maskCtx.globalCompositeOperation =
      "source-over";

    maskCtx.globalAlpha = 1;

    maskCtx.drawImage(
      logoImage,
      logoX,
      logoY,
      logoWidth,
      logoHeight
    );
  }


  function createDigits() {
    digits = [];

    let rowIndex = 0;

    for (
      let y = SETTINGS.cellSize / 2;
      y <= height;
      y += SETTINGS.cellSize
    ) {
      const offset =
        rowIndex % 2 === 0
          ? SETTINGS.cellSize / 2
          : SETTINGS.cellSize;

      for (
        let x = offset;
        x <= width;
        x += SETTINGS.cellSize
      ) {
        digits.push({
          x: x,
          y: y,
          value: randomDigit(),

          animated:
            Math.random() <
            SETTINGS.animatedPercentage,

          opacity: random(
            SETTINGS.minOpacity,
            SETTINGS.maxOpacity
          ),

          white:
            Math.random() > 0.48
        });
      }

      rowIndex++;
    }
  }


  function resize() {
    const rect = wrap.getBoundingClientRect();

    width = Math.max(
      1,
      Math.round(rect.width)
    );

    height = Math.max(
      1,
      Math.round(rect.height)
    );

    dpr = Math.min(
      window.devicePixelRatio || 1,
      2
    );

    canvas.width =
      Math.round(width * dpr);

    canvas.height =
      Math.round(height * dpr);

    canvas.style.width =
      width + "px";

    canvas.style.height =
      height + "px";

    digitsCanvas.width =
      Math.round(width * dpr);

    digitsCanvas.height =
      Math.round(height * dpr);

    maskCanvas.width =
      Math.round(width * dpr);

    maskCanvas.height =
      Math.round(height * dpr);

    ctx.setTransform(
      dpr,
      0,
      0,
      dpr,
      0,
      0
    );

    digitsCtx.setTransform(
      dpr,
      0,
      0,
      dpr,
      0,
      0
    );

    maskCtx.setTransform(
      dpr,
      0,
      0,
      dpr,
      0,
      0
    );

    calculateLogoSize();
    createMask();
    createDigits();
  }


  function updateDigits(time) {
    const step = Math.floor(
      time /
      (1000 / SETTINGS.scrambleSpeed)
    );

    if (step === lastStep) {
      return;
    }

    lastStep = step;

    for (const digit of digits) {
      if (!digit.animated) {
        continue;
      }

      digit.value = randomDigit();

      digit.opacity = random(
        SETTINGS.minOpacity,
        SETTINGS.maxOpacity
      );

      digit.white =
        Math.random() > 0.45;
    }
  }


  function drawDigits() {
    digitsCtx.clearRect(
      0,
      0,
      width,
      height
    );

    digitsCtx.globalCompositeOperation =
      "source-over";

    digitsCtx.textAlign = "center";
    digitsCtx.textBaseline = "middle";

    digitsCtx.font =
      SETTINGS.fontWeight +
      " " +
      SETTINGS.fontSize +
      "px Arial, Helvetica, monospace";

    for (const digit of digits) {
      digitsCtx.globalAlpha =
        digit.opacity;

      digitsCtx.fillStyle =
        digit.white
          ? SETTINGS.whiteColor
          : SETTINGS.grayColor;

      digitsCtx.fillText(
        digit.value,
        digit.x,
        digit.y
      );
    }

    digitsCtx.globalAlpha = 1;

    /*
     * Обрезаем цифры по форме PNG.
     */
    digitsCtx.globalCompositeOperation =
      "destination-in";

    digitsCtx.drawImage(
      maskCanvas,
      0,
      0,
      width,
      height
    );

    digitsCtx.globalCompositeOperation =
      "source-over";
  }


  function render(time) {
    updateDigits(time);
    drawDigits();

    ctx.clearRect(
      0,
      0,
      width,
      height
    );

    ctx.drawImage(
      digitsCanvas,
      0,
      0,
      width,
      height
    );

    requestAnimationFrame(render);
  }


  async function init() {
    try {
      await loadLogo();

      resize();

      window.addEventListener(
        "resize",
        resize
      );

      if (
        typeof ResizeObserver !==
        "undefined"
      ) {
        const observer =
          new ResizeObserver(resize);

        observer.observe(wrap);
      }

      requestAnimationFrame(render);

    } catch (error) {
      console.error(error);

      /*
       * Сообщение об ошибке.
       */
      canvas.width =
        Math.max(
          300,
          wrap.clientWidth
        );

      canvas.height =
        Math.max(
          100,
          wrap.clientHeight
        );

      ctx.fillStyle = "#ff3b30";
      ctx.font = "14px Arial";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";

      ctx.fillText(
        "Не найден файл Group 143725952.png",
        canvas.width / 2,
        canvas.height / 2
      );
    }
  }


  init();
</script>

</body>
</html>
