<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Digital Logo</title>

  <style>
    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      background: transparent;
    }
  </style>
</head>

<body>

<canvas id="logoCanvas"></canvas>

<script>
  const canvas = document.getElementById("logoCanvas");
  const ctx = canvas.getContext("2d");

  const LOGO_URL =
    "https://static.tildacdn.com/tild3565-6238-4832-b335-646336323433/Group_143725952.png";

  /*
   * Основные настройки анимации.
   */
  const SETTINGS = {
    /*
     * Размер логотипа внутри HTML-блока.
     * 0.9 означает 90% доступного пространства.
     */
    logoScale: 0.9,

    /*
     * Размер цифр — мелкий, как на портрете.
     */
    fontSize: 5,

    /*
     * Плотность цифровой сетки.
     */
    columnGap: 6,
    rowGap: 6,

    /*
     * Цвет цифр.
     *
     * Для белого фона используется чёрный.
     * На тёмном фоне можно поставить #ffffff.
     */
    digitColor: "#111111",

    /*
     * Толщина шрифта.
     */
    fontWeight: 400,

    /*
     * Минимальная и максимальная
     * прозрачность отдельных цифр.
     */
    minOpacity: 0.25,
    maxOpacity: 0.95,

    /*
     * Интервалы смены цифр.
     *
     * Каждая цифра меняется
     * самостоятельно и с разной скоростью.
     */
    minChangeDelay: 70,
    maxChangeDelay: 550,

    /*
     * Вероятность смены значения
     * после наступления интервала.
     */
    changeProbability: 0.75
  };

  let width = 0;
  let height = 0;
  let dpr = 1;

  let logoImage = null;

  let logoX = 0;
  let logoY = 0;
  let logoWidth = 0;
  let logoHeight = 0;

  let digits = [];

  let maskCanvas = null;
  let maskCtx = null;

  let digitsCanvas = null;
  let digitsCtx = null;


  /*
   * Случайное число в заданном диапазоне.
   */
  function random(min, max) {
    return min + Math.random() * (max - min);
  }


  /*
   * Случайная цифра от 0 до 9.
   */
  function randomDigit() {
    return String(
      Math.floor(Math.random() * 10)
    );
  }


  /*
   * Загрузка PNG-логотипа.
   */
  function loadLogo() {
    return new Promise((resolve, reject) => {
      const image = new Image();

      image.crossOrigin = "anonymous";

      image.onload = function () {
        logoImage = image;
        resolve();
      };

      image.onerror = function () {
        reject(
          new Error("Не удалось загрузить изображение логотипа")
        );
      };

      image.src = LOGO_URL;
    });
  }


  /*
   * Подготовка размера основного canvas.
   */
  function resizeCanvas() {
    dpr = Math.min(
      window.devicePixelRatio || 1,
      2
    );

    width = window.innerWidth;
    height = window.innerHeight;

    canvas.width = Math.round(width * dpr);
    canvas.height = Math.round(height * dpr);

    canvas.style.width = width + "px";
    canvas.style.height = height + "px";

    ctx.setTransform(
      dpr,
      0,
      0,
      dpr,
      0,
      0
    );

    createHiddenCanvases();
    calculateLogoSize();
    createLogoMask();
    createDigits();
  }


  /*
   * Создаём два вспомогательных canvas:
   *
   * maskCanvas — хранит форму логотипа;
   * digitsCanvas — хранит цифровую сетку.
   */
  function createHiddenCanvases() {
    maskCanvas = document.createElement("canvas");
    maskCanvas.width = canvas.width;
    maskCanvas.height = canvas.height;

    maskCtx = maskCanvas.getContext("2d");

    maskCtx.setTransform(
      dpr,
      0,
      0,
      dpr,
      0,
      0
    );


    digitsCanvas = document.createElement("canvas");
    digitsCanvas.width = canvas.width;
    digitsCanvas.height = canvas.height;

    digitsCtx = digitsCanvas.getContext("2d");

    digitsCtx.setTransform(
      dpr,
      0,
      0,
      dpr,
      0,
      0
    );
  }


  /*
   * Рассчитываем размер логотипа,
   * сохраняя исходные пропорции PNG.
   */
  function calculateLogoSize() {
    const imageRatio =
      logoImage.naturalWidth /
      logoImage.naturalHeight;

    const availableWidth =
      width * SETTINGS.logoScale;

    const availableHeight =
      height * SETTINGS.logoScale;

    logoWidth = availableWidth;
    logoHeight = logoWidth / imageRatio;

    if (logoHeight > availableHeight) {
      logoHeight = availableHeight;
      logoWidth = logoHeight * imageRatio;
    }

    logoX = (width - logoWidth) / 2;
    logoY = (height - logoHeight) / 2;
  }


  /*
   * Создаём маску формы логотипа.
   *
   * PNG остаётся невидимым.
   * Используется только его прозрачность.
   */
  function createLogoMask() {
    maskCtx.clearRect(
      0,
      0,
      width,
      height
    );

    maskCtx.drawImage(
      logoImage,
      logoX,
      logoY,
      logoWidth,
      logoHeight
    );
  }


  /*
   * Создаём фиксированную сетку цифр.
   *
   * Координаты каждой цифры после
   * создания больше не меняются.
   */
  function createDigits() {
    digits = [];

    let rowIndex = 0;

    for (
      let y = logoY;
      y <= logoY + logoHeight;
      y += SETTINGS.rowGap
    ) {
      /*
       * Каждую вторую строку немного
       * сдвигаем, чтобы сетка выглядела
       * плотнее и менее механически.
       */
      const rowOffset =
        rowIndex % 2 === 0
          ? 0
          : SETTINGS.columnGap / 2;

      for (
        let x = logoX + rowOffset;
        x <= logoX + logoWidth;
        x += SETTINGS.columnGap
      ) {
        digits.push({
          x: x,
          y: y,

          value: randomDigit(),

          opacity: random(
            SETTINGS.minOpacity,
            SETTINGS.maxOpacity
          ),

          changeDelay: random(
            SETTINGS.minChangeDelay,
            SETTINGS.maxChangeDelay
          ),

          lastChange:
            performance.now() -
            random(
              0,
              SETTINGS.maxChangeDelay
            )
        });
      }

      rowIndex++;
    }
  }


  /*
   * Обновление значений цифр.
   *
   * Цифры стоят на месте.
   * Меняется только их значение.
   */
  function updateDigits(time) {
    for (const digit of digits) {
      const timePassed =
        time - digit.lastChange;

      if (timePassed >= digit.changeDelay) {
        if (
          Math.random() <
          SETTINGS.changeProbability
        ) {
          digit.value = randomDigit();

          digit.opacity = random(
            SETTINGS.minOpacity,
            SETTINGS.maxOpacity
          );
        }

        digit.lastChange = time;

        digit.changeDelay = random(
          SETTINGS.minChangeDelay,
          SETTINGS.maxChangeDelay
        );
      }
    }
  }


  /*
   * Отрисовка цифровой сетки.
   */
  function drawDigits() {
    digitsCtx.clearRect(
      0,
      0,
      width,
      height
    );

    digitsCtx.globalCompositeOperation =
      "source-over";

    digitsCtx.font =
      `${SETTINGS.fontWeight} ${SETTINGS.fontSize}px Arial, Helvetica, sans-serif`;

    digitsCtx.textAlign = "center";
    digitsCtx.textBaseline = "middle";

    digitsCtx.fillStyle =
      SETTINGS.digitColor;

    for (const digit of digits) {
      digitsCtx.globalAlpha =
        digit.opacity;

      digitsCtx.fillText(
        digit.value,
        digit.x,
        digit.y
      );
    }

    digitsCtx.globalAlpha = 1;

    /*
     * Обрезаем цифровую сетку
     * по прозрачной форме PNG.
     */
    digitsCtx.globalCompositeOperation =
      "destination-in";

    digitsCtx.drawImage(
      maskCanvas,
      0,
      0,
      canvas.width,
      canvas.height,
      0,
      0,
      width,
      height
    );

    digitsCtx.globalCompositeOperation =
      "source-over";
  }


  /*
   * Главный цикл анимации.
   */
  function animate(time) {
    updateDigits(time);
    drawDigits();

    ctx.clearRect(
      0,
      0,
      width,
      height
    );

    ctx.drawImage(
      digitsCanvas,
      0,
      0,
      canvas.width,
      canvas.height,
      0,
      0,
      width,
      height
    );

    requestAnimationFrame(animate);
  }


  /*
   * Запуск.
   */
  async function init() {
    try {
      await loadLogo();

      resizeCanvas();

      window.addEventListener(
        "resize",
        resizeCanvas
      );

      requestAnimationFrame(animate);

    } catch (error) {
      console.error(error);
    }
  }

  init();
</script>

</body>
</html>
