<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Animated Digital Logo</title>

  <style>
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: transparent;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #logoCanvas {
      display: block;
      width: 100%;
      height: 100%;
      background: transparent;

      /*
       * PNG используется как маска.
       * Цифры будут видны только внутри логотипа.
       */
      -webkit-mask-image: url("https://static.tildacdn.com/tild3565-6238-4832-b335-646336323433/Group_143725952.png");
      mask-image: url("https://static.tildacdn.com/tild3565-6238-4832-b335-646336323433/Group_143725952.png");

      -webkit-mask-repeat: no-repeat;
      mask-repeat: no-repeat;

      -webkit-mask-position: center;
      mask-position: center;

      -webkit-mask-size: 90% 90%;
      mask-size: 90% 90%;

      -webkit-mask-mode: alpha;
      mask-mode: alpha;
    }
  </style>
</head>

<body>

<canvas id="logoCanvas"></canvas>

<script>
  const canvas =
    document.getElementById("logoCanvas");

  const ctx =
    canvas.getContext("2d");


  /*
   * ========================================
   * НАСТРОЙКИ
   * ========================================
   */

  const SETTINGS = {
    /*
     * Размер цифр.
     * 5 px — примерно как на портрете.
     */
    fontSize: 5,

    /*
     * Толщина цифр.
     */
    fontWeight: 400,

    /*
     * Расстояние между цифрами.
     */
    horizontalGap: 6,
    verticalGap: 6,

    /*
     * Цвет цифр.
     */
    digitColor: "#111111",

    /*
     * Прозрачность цифр.
     * Благодаря разной прозрачности
     * логотип выглядит менее плоским.
     */
    minOpacity: 0.28,
    maxOpacity: 0.95,

    /*
     * Скорость перебора.
     *
     * У каждой цифры будет
     * собственный случайный интервал.
     */
    minChangeDelay: 70,
    maxChangeDelay: 550,

    /*
     * Вероятность того, что цифра
     * изменится при очередной проверке.
     */
    changeProbability: 0.78,

    /*
     * Сколько пространства занимает маска.
     * Это значение также указано в CSS:
     * mask-size: 90% 90%.
     */
    logoScale: 0.9
  };


  /*
   * ========================================
   * ПЕРЕМЕННЫЕ
   * ========================================
   */

  let canvasWidth = 0;
  let canvasHeight = 0;

  let pixelRatio = 1;

  let digits = [];

  let animationFrame = null;


  /*
   * ========================================
   * СЛУЧАЙНЫЕ ЗНАЧЕНИЯ
   * ========================================
   */

  function randomNumber(min, max) {
    return min + Math.random() * (max - min);
  }


  function randomDigit() {
    return String(
      Math.floor(Math.random() * 10)
    );
  }


  /*
   * ========================================
   * СОЗДАНИЕ ЦИФРОВОЙ СЕТКИ
   * ========================================
   */

  function createDigits() {
    digits = [];

    const now =
      performance.now();

    let rowIndex = 0;

    /*
     * Цифры создаются по всей площади canvas.
     * CSS-маска сама обрежет их по логотипу.
     */
    for (
      let y = 0;
      y <= canvasHeight;
      y += SETTINGS.verticalGap
    ) {
      /*
       * Каждая вторая строка слегка смещена.
       * Так цифровая текстура выглядит плотнее.
       */
      const rowOffset =
        rowIndex % 2 === 0
          ? 0
          : SETTINGS.horizontalGap / 2;

      for (
        let x = rowOffset;
        x <= canvasWidth;
        x += SETTINGS.horizontalGap
      ) {
        digits.push({
          /*
           * Эти координаты больше
           * никогда не изменяются.
           */
          x: x,
          y: y,

          value: randomDigit(),

          opacity: randomNumber(
            SETTINGS.minOpacity,
            SETTINGS.maxOpacity
          ),

          changeDelay: randomNumber(
            SETTINGS.minChangeDelay,
            SETTINGS.maxChangeDelay
          ),

          lastChange:
            now -
            randomNumber(
              0,
              SETTINGS.maxChangeDelay
            )
        });
      }

      rowIndex++;
    }
  }


  /*
   * ========================================
   * ИЗМЕНЕНИЕ ЗНАЧЕНИЙ
   * ========================================
   */

  function updateDigits(time) {
    for (const digit of digits) {
      const elapsed =
        time - digit.lastChange;

      if (elapsed < digit.changeDelay) {
        continue;
      }

      /*
       * Цифра остаётся на том же месте.
       * Меняется только её значение.
       */
      if (
        Math.random() <
        SETTINGS.changeProbability
      ) {
        digit.value =
          randomDigit();

        digit.opacity =
          randomNumber(
            SETTINGS.minOpacity,
            SETTINGS.maxOpacity
          );
      }

      digit.lastChange = time;

      digit.changeDelay =
        randomNumber(
          SETTINGS.minChangeDelay,
          SETTINGS.maxChangeDelay
        );
    }
  }


  /*
   * ========================================
   * ОТРИСОВКА
   * ========================================
   */

  function drawDigits() {
    ctx.clearRect(
      0,
      0,
      canvasWidth,
      canvasHeight
    );

    ctx.font =
      `${SETTINGS.fontWeight} ${SETTINGS.fontSize}px Arial, Helvetica, sans-serif`;

    ctx.textAlign =
      "center";

    ctx.textBaseline =
      "middle";

    ctx.fillStyle =
      SETTINGS.digitColor;

    for (const digit of digits) {
      ctx.globalAlpha =
        digit.opacity;

      ctx.fillText(
        digit.value,
        digit.x,
        digit.y
      );
    }

    ctx.globalAlpha = 1;
  }


  /*
   * ========================================
   * АНИМАЦИЯ
   * ========================================
   */

  function animate(time) {
    updateDigits(time);
    drawDigits();

    animationFrame =
      requestAnimationFrame(animate);
  }


  /*
   * ========================================
   * РАЗМЕР CANVAS
   * ========================================
   */

  function resizeCanvas() {
    const rect =
      canvas.getBoundingClientRect();

    canvasWidth =
      Math.max(1, rect.width);

    canvasHeight =
      Math.max(1, rect.height);

    pixelRatio =
      Math.min(
        window.devicePixelRatio || 1,
        2
      );

    canvas.width =
      Math.round(
        canvasWidth * pixelRatio
      );

    canvas.height =
      Math.round(
        canvasHeight * pixelRatio
      );

    /*
     * Все координаты продолжаем задавать
     * в обычных CSS-пикселях.
     */
    ctx.setTransform(
      pixelRatio,
      0,
      0,
      pixelRatio,
      0,
      0
    );

    createDigits();
  }


  /*
   * ========================================
   * ЗАПУСК
   * ========================================
   */

  function init() {
    resizeCanvas();

    window.addEventListener(
      "resize",
      resizeCanvas
    );

    if (
      typeof ResizeObserver !== "undefined"
    ) {
      const observer =
        new ResizeObserver(function () {
          resizeCanvas();
        });

      observer.observe(canvas);
    }

    if (animationFrame) {
      cancelAnimationFrame(
        animationFrame
      );
    }

    animationFrame =
      requestAnimationFrame(animate);
  }


  init();
</script>

</body>
</html>
