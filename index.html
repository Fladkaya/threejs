<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Matrix Portrait</title>

  <style>
    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #ffffff;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      touch-action: none;
    }
  </style>
</head>

<body>

<script type="module">
import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.182.0/build/three.module.js";

/* =========================
   RENDERER
========================= */

const renderer = new THREE.WebGLRenderer({
  antialias: true,
  alpha: false
});

renderer.setPixelRatio(Math.min(2, window.devicePixelRatio));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0xffffff, 1);

document.body.appendChild(renderer.domElement);


/* =========================
   SCENE / CAMERA
========================= */

const scene = new THREE.Scene();

const camera = new THREE.OrthographicCamera(
  -1,
  1,
  1,
  -1,
  0,
  1
);


/* =========================
   PHOTO
========================= */

const photoTex = await new THREE.TextureLoader().loadAsync(
  "https://static.tildacdn.com/tild3630-6130-4336-b734-396338333766/pexels-lepta-studio-.webp"
);

photoTex.colorSpace = THREE.SRGBColorSpace;
photoTex.minFilter = THREE.LinearFilter;
photoTex.magFilter = THREE.LinearFilter;


/* =========================
   DIGITS ATLAS
========================= */

function makeDigitsAtlasTexture() {
  const chars = "0123456789";
  const grid = 4;
  const cell = 96;

  const canvas = document.createElement("canvas");

  canvas.width = grid * cell;
  canvas.height = grid * cell;

  const ctx = canvas.getContext("2d");

  ctx.fillStyle = "#ffffff";
  ctx.fillRect(
    0,
    0,
    canvas.width,
    canvas.height
  );

  ctx.textAlign = "center";
  ctx.textBaseline = "middle";

  ctx.font =
    `800 ${Math.floor(cell * 0.82)}px monospace`;

  ctx.fillStyle = "#000000";

  for (let i = 0; i < grid * grid; i++) {
    const character =
      chars[i % chars.length];

    const x =
      (i % grid) * cell +
      cell / 2;

    const y =
      Math.floor(i / grid) * cell +
      cell / 2;

    ctx.fillText(
      character,
      x,
      y
    );
  }

  const texture =
    new THREE.CanvasTexture(canvas);

  texture.colorSpace =
    THREE.SRGBColorSpace;

  texture.minFilter =
    THREE.LinearFilter;

  texture.magFilter =
    THREE.LinearFilter;

  return {
    texture,
    grid
  };
}

const digitsAtlas =
  makeDigitsAtlasTexture();

const digitsTex =
  digitsAtlas.texture;

const digitsGrid =
  digitsAtlas.grid;


/* =========================
   POINTER
========================= */

const mouse =
  new THREE.Vector2(0.5, 0.5);

let active = 0;

function setPointer(event) {
  const rect =
    renderer.domElement.getBoundingClientRect();

  mouse.x =
    (event.clientX - rect.left) /
    rect.width;

  mouse.y =
    1 -
    (event.clientY - rect.top) /
    rect.height;
}

renderer.domElement.addEventListener(
  "pointermove",
  setPointer
);

renderer.domElement.addEventListener(
  "pointerenter",
  event => {
    if (event.pointerType === "mouse") {
      active = 1;
    }
  }
);

renderer.domElement.addEventListener(
  "pointerleave",
  event => {
    if (event.pointerType === "mouse") {
      active = 0;
    }
  }
);

renderer.domElement.addEventListener(
  "pointerdown",
  event => {
    setPointer(event);
    active = 1;
  }
);

renderer.domElement.addEventListener(
  "pointerup",
  () => {
    active = 0;
  }
);

renderer.domElement.addEventListener(
  "pointercancel",
  () => {
    active = 0;
  }
);


/* =========================
   SETTINGS
========================= */

const uniforms = {
  uTime: {
    value: 0
  },

  uRes: {
    value: new THREE.Vector2(
      window.innerWidth,
      window.innerHeight
    )
  },

  uPhoto: {
    value: photoTex
  },

  uDigits: {
    value: digitsTex
  },

  uGrid: {
    value: digitsGrid
  },

  /*
   * Размер клетки с цифрой.
   * Меньше — цифр больше.
   */
  uCellPx: {
    value: 9.0
  },

  /*
   * Цвет цифр.
   * 0.0 — чёрный.
   */
  uInk: {
    value: 0.0
  },

  /*
   * Плотность цифр.
   */
  uDensity: {
    value: 2.4
  },

  /*
   * Начало нижнего растворения.
   * 0.30 означает примерно 30% высоты снизу.
   */
  uBottomFadeHeight: {
    value: 0.30
  },

  uHoverInkMul: {
    value: 0.2
  },

  uBrushRadiusPx: {
    value: 60.0
  },

  uScrambleSpeed: {
    value: 18.0
  },

  uMouse: {
    value: mouse
  },

  uActive: {
    value: 0.0
  }
};


/* =========================
   SHADER
========================= */

const material =
  new THREE.ShaderMaterial({

  uniforms,

  vertexShader: `
    varying vec2 vUv;

    void main() {
      vUv = uv;

      gl_Position = vec4(
        position.xy,
        0.0,
        1.0
      );
    }
  `,

  fragmentShader: `
    precision highp float;

    varying vec2 vUv;

    uniform float uTime;
    uniform vec2 uRes;

    uniform sampler2D uPhoto;
    uniform sampler2D uDigits;

    uniform float uGrid;
    uniform float uCellPx;
    uniform float uInk;
    uniform float uDensity;
    uniform float uBottomFadeHeight;

    uniform float uHoverInkMul;
    uniform float uBrushRadiusPx;
    uniform float uScrambleSpeed;

    uniform vec2 uMouse;
    uniform float uActive;


    float hash12(vec2 p) {
      vec3 p3 =
        fract(
          vec3(p.xyx) *
          0.1031
        );

      p3 +=
        dot(
          p3,
          p3.yzx + 33.33
        );

      return fract(
        (p3.x + p3.y) *
        p3.z
      );
    }


    float luma(vec3 color) {
      return dot(
        color,
        vec3(
          0.2126,
          0.7152,
          0.0722
        )
      );
    }


    void main() {
      vec3 background =
        vec3(1.0);

      vec2 fragmentPosition =
        vUv * uRes;

      float cell =
        max(
          6.0,
          uCellPx
        );

      vec2 gridId =
        floor(
          fragmentPosition /
          cell
        );

      vec2 cellUv =
        fract(
          fragmentPosition /
          cell
        );


      /*
       * Яркость фотографии.
       */
      vec3 photo =
        texture2D(
          uPhoto,
          vUv
        ).rgb;

      float photoLuma =
        luma(photo);


      /*
       * Основная маска портрета.
       */
      float portraitMask =
        smoothstep(
          0.02,
          0.78,
          1.0 - photoLuma
        );

      portraitMask =
        pow(
          portraitMask,
          0.55
        );


      /*
       * Плавное растворение нижней части.
       *
       * В самом низу значение равно 0.
       * Выше uBottomFadeHeight — значение равно 1.
       */
      float bottomFade =
        smoothstep(
          0.0,
          uBottomFadeHeight,
          vUv.y
        );

      /*
       * Делаем переход ещё мягче.
       */
      bottomFade =
        bottomFade *
        bottomFade *
        (
          3.0 -
          2.0 * bottomFade
        );

      portraitMask *=
        bottomFade;


      /*
       * Область курсора.
       */
      vec2 mousePx =
        uMouse * uRes;

      float distanceToMouse =
        distance(
          fragmentPosition,
          mousePx
        );

      float hover =
        uActive *
        step(
          distanceToMouse,
          uBrushRadiusPx
        );


      /*
       * Выбираем цифру.
       */
      float baseDigit =
        floor(
          hash12(gridId) *
          10.0
        );

      float animationStep =
        floor(
          uTime *
          uScrambleSpeed
        );

      float animatedDigit =
        floor(
          hash12(
            gridId +
            vec2(
              animationStep,
              animationStep * 1.37
            )
          ) *
          10.0
        );

      float digitValue =
        mix(
          baseDigit,
          animatedDigit,
          hover
        );


      /*
       * Координаты цифры в атласе.
       */
      float gridX =
        mod(
          digitValue,
          uGrid
        );

      float gridY =
        floor(
          digitValue /
          uGrid
        );

      vec2 atlasUv =
        (
          vec2(
            gridX,
            gridY
          ) +
          cellUv
        ) /
        uGrid;


      /*
       * Форма цифры.
       */
      float digit =
        1.0 -
        texture2D(
          uDigits,
          atlasUv
        ).r;


      /*
       * Насыщенность цифр.
       */
      float inkAmount =
        clamp(
          digit *
          portraitMask *
          uDensity,
          0.0,
          1.0
        );


      /*
       * Цвет цифр.
       */
      vec3 normalInk =
        vec3(uInk);

      vec3 hoverInk =
        vec3(
          clamp(
            uInk *
            uHoverInkMul,
            0.0,
            1.0
          )
        );

      vec3 finalInk =
        mix(
          normalInk,
          hoverInk,
          hover
        );


      /*
       * Финальный цвет.
       */
      vec3 finalColor =
        mix(
          background,
          finalInk,
          inkAmount
        );

      gl_FragColor =
        vec4(
          finalColor,
          1.0
        );
    }
  `
});


/* =========================
   PLANE
========================= */

const geometry =
  new THREE.PlaneGeometry(2, 2);

const mesh =
  new THREE.Mesh(
    geometry,
    material
  );

scene.add(mesh);


/* =========================
   RESIZE
========================= */

window.addEventListener(
  "resize",
  () => {
    renderer.setSize(
      window.innerWidth,
      window.innerHeight
    );

    uniforms.uRes.value.set(
      window.innerWidth,
      window.innerHeight
    );
  }
);


/* =========================
   ANIMATION
========================= */

const clock =
  new THREE.Clock();

renderer.setAnimationLoop(
  () => {
    uniforms.uTime.value +=
      clock.getDelta();

    uniforms.uActive.value =
      active ? 1.0 : 0.0;

    renderer.render(
      scene,
      camera
    );
  }
);
</script>

</body>
</html>
