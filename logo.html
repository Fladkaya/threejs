<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Animated Digital Logo</title>

  <style>
    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      background: transparent;
    }
  </style>
</head>

<body>

<canvas id="logoCanvas"></canvas>

<script>
const canvas = document.getElementById("logoCanvas");
const ctx = canvas.getContext("2d");

const LOGO_URL =
  "https://static.tildacdn.com/tild3565-6238-4832-b335-646336323433/Group_143725952.png";


/* ========================================
   НАСТРОЙКИ
======================================== */

const SETTINGS = {

  /*
   * Размер всего логотипа внутри блока.
   * 0.88 = 88% ширины или высоты.
   */
  logoScale: 0.88,

  /*
   * Размер цифр.
   * Сделан маленьким и плотным.
   */
  fontSize: 8,

  /*
   * Расстояние между цифрами по горизонтали.
   */
  columnGap: 9,

  /*
   * Расстояние между строками.
   */
  rowGap: 10,

  /*
   * Цвет цифр.
   * Белый подходит для тёмного фона.
   */
  digitColor: "#ffffff",

  /*
   * Минимальная и максимальная прозрачность.
   */
  minOpacity: 0.25,
  maxOpacity: 1,

  /*
   * Скорость самостоятельного движения цифр.
   */
  minSpeed: 3,
  maxSpeed: 13,

  /*
   * Как часто отдельные цифры меняются.
   * Значения указаны в миллисекундах.
   */
  minChangeDelay: 100,
  maxChangeDelay: 650,

  /*
   * Небольшое горизонтальное движение.
   */
  horizontalMovement: 1.5,

  /*
   * Небольшое вертикальное движение.
   */
  verticalMovement: 5,

  /*
   * Скорость лёгкого мерцания.
   */
  flickerSpeed: 0.002
};


/* ========================================
   ПЕРЕМЕННЫЕ
======================================== */

let width = 0;
let height = 0;
let dpr = 1;

let logoImage = null;

let logoX = 0;
let logoY = 0;
let logoWidth = 0;
let logoHeight = 0;

let particles = [];

let maskCanvas;
let maskCtx;

let digitsCanvas;
let digitsCtx;

let lastTime = performance.now();


/* ========================================
   ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ
======================================== */

function random(min, max) {
  return min + Math.random() * (max - min);
}


function randomDigit() {
  return String(
    Math.floor(Math.random() * 10)
  );
}


/* ========================================
   ЗАГРУЗКА ЛОГОТИПА
======================================== */

function loadLogo() {
  return new Promise((resolve, reject) => {
    const image = new Image();

    image.crossOrigin = "anonymous";

    image.onload = () => {
      logoImage = image;
      resolve();
    };

    image.onerror = () => {
      reject(
        new Error("Не удалось загрузить логотип")
      );
    };

    image.src = LOGO_URL;
  });
}


/* ========================================
   ПОДГОТОВКА CANVAS
======================================== */

function resizeCanvas() {
  dpr = Math.min(
    window.devicePixelRatio || 1,
    2
  );

  width = window.innerWidth;
  height = window.innerHeight;

  canvas.width = Math.round(width * dpr);
  canvas.height = Math.round(height * dpr);

  canvas.style.width = width + "px";
  canvas.style.height = height + "px";

  ctx.setTransform(
    dpr,
    0,
    0,
    dpr,
    0,
    0
  );

  prepareHiddenCanvases();
  calculateLogoSize();
  createLogoMask();
  createParticles();
}


/* ========================================
   СКРЫТЫЕ CANVAS
======================================== */

function prepareHiddenCanvases() {
  maskCanvas =
    document.createElement("canvas");

  maskCanvas.width =
    canvas.width;

  maskCanvas.height =
    canvas.height;

  maskCtx =
    maskCanvas.getContext("2d");

  maskCtx.setTransform(
    dpr,
    0,
    0,
    dpr,
    0,
    0
  );


  digitsCanvas =
    document.createElement("canvas");

  digitsCanvas.width =
    canvas.width;

  digitsCanvas.height =
    canvas.height;

  digitsCtx =
    digitsCanvas.getContext("2d");

  digitsCtx.setTransform(
    dpr,
    0,
    0,
    dpr,
    0,
    0
  );
}


/* ========================================
   РАЗМЕР ЛОГОТИПА
======================================== */

function calculateLogoSize() {
  const imageRatio =
    logoImage.naturalWidth /
    logoImage.naturalHeight;

  const availableWidth =
    width * SETTINGS.logoScale;

  const availableHeight =
    height * SETTINGS.logoScale;

  logoWidth = availableWidth;
  logoHeight = logoWidth / imageRatio;

  if (logoHeight > availableHeight) {
    logoHeight = availableHeight;
    logoWidth = logoHeight * imageRatio;
  }

  logoX = (width - logoWidth) / 2;
  logoY = (height - logoHeight) / 2;
}


/* ========================================
   МАСКА ФОРМЫ ЛОГОТИПА
======================================== */

function createLogoMask() {
  maskCtx.clearRect(
    0,
    0,
    width,
    height
  );

  maskCtx.drawImage(
    logoImage,
    logoX,
    logoY,
    logoWidth,
    logoHeight
  );
}


/* ========================================
   СОЗДАНИЕ МЕЛКИХ ЦИФР
======================================== */

function createParticles() {
  particles = [];

  let rowIndex = 0;

  for (
    let y = logoY;
    y <= logoY + logoHeight;
    y += SETTINGS.rowGap
  ) {
    let columnIndex = 0;

    /*
     * Каждую вторую строку немного сдвигаем.
     * Получается более живая цифровая сетка.
     */
    const rowOffset =
      rowIndex % 2 === 0
        ? 0
        : SETTINGS.columnGap / 2;

    for (
      let x = logoX + rowOffset;
      x <= logoX + logoWidth;
      x += SETTINGS.columnGap
    ) {
      particles.push({
        baseX: x,
        baseY: y,

        x,
        y,

        digit: randomDigit(),

        opacity: random(
          SETTINGS.minOpacity,
          SETTINGS.maxOpacity
        ),

        speed: random(
          SETTINGS.minSpeed,
          SETTINGS.maxSpeed
        ),

        /*
         * Каждая цифра получает
         * собственное направление.
         */
        directionX:
          Math.random() > 0.5 ? 1 : -1,

        directionY:
          Math.random() > 0.5 ? 1 : -1,

        /*
         * У каждой цифры своя фаза движения.
         */
        phaseX:
          random(0, Math.PI * 2),

        phaseY:
          random(0, Math.PI * 2),

        flickerPhase:
          random(0, Math.PI * 2),

        changeDelay:
          random(
            SETTINGS.minChangeDelay,
            SETTINGS.maxChangeDelay
          ),

        lastChange:
          performance.now() -
          random(
            0,
            SETTINGS.maxChangeDelay
          ),

        columnIndex,
        rowIndex
      });

      columnIndex++;
    }

    rowIndex++;
  }
}


/* ========================================
   ОБНОВЛЕНИЕ ЦИФР
======================================== */

function updateParticles(time) {
  for (const particle of particles) {

    /*
     * Каждая цифра двигается независимо.
     * Движение небольшое, чтобы форма
     * логотипа визуально не разрушалась.
     */
    particle.x =
      particle.baseX +
      Math.sin(
        time * 0.001 *
        particle.speed +
        particle.phaseX
      ) *
      SETTINGS.horizontalMovement *
      particle.directionX;

    particle.y =
      particle.baseY +
      Math.sin(
        time * 0.001 *
        particle.speed * 0.7 +
        particle.phaseY
      ) *
      SETTINGS.verticalMovement *
      particle.directionY;


    /*
     * Каждая цифра самостоятельно
     * меняется через случайный интервал.
     */
    if (
      time - particle.lastChange >
      particle.changeDelay
    ) {
      particle.digit =
        randomDigit();

      particle.lastChange =
        time;

      particle.changeDelay =
        random(
          SETTINGS.minChangeDelay,
          SETTINGS.maxChangeDelay
        );

      particle.opacity =
        random(
          SETTINGS.minOpacity,
          SETTINGS.maxOpacity
        );
    }
  }
}


/* ========================================
   ОТРИСОВКА ЦИФР
======================================== */

function drawDigits(time) {
  digitsCtx.clearRect(
    0,
    0,
    width,
    height
  );

  digitsCtx.globalCompositeOperation =
    "source-over";

  digitsCtx.font =
    `600 ${SETTINGS.fontSize}px Arial, sans-serif`;

  digitsCtx.textAlign =
    "center";

  digitsCtx.textBaseline =
    "middle";

  digitsCtx.fillStyle =
    SETTINGS.digitColor;

  for (const particle of particles) {

    /*
     * Лёгкое независимое мерцание.
     */
    const flicker =
      0.72 +
      Math.sin(
        time *
        SETTINGS.flickerSpeed +
        particle.flickerPhase
      ) * 0.28;

    digitsCtx.globalAlpha =
      Math.max(
        0.1,
        particle.opacity * flicker
      );

    digitsCtx.fillText(
      particle.digit,
      particle.x,
      particle.y
    );
  }

  digitsCtx.globalAlpha = 1;


  /*
   * Оставляем цифры только
   * внутри формы логотипа.
   */
  digitsCtx.globalCompositeOperation =
    "destination-in";

  digitsCtx.drawImage(
    maskCanvas,
    0,
    0,
    canvas.width,
    canvas.height,
    0,
    0,
    width,
    height
  );

  digitsCtx.globalCompositeOperation =
    "source-over";
}


/* ========================================
   ФИНАЛЬНАЯ ОТРИСОВКА
======================================== */

function render(time) {
  ctx.clearRect(
    0,
    0,
    width,
    height
  );

  updateParticles(time);
  drawDigits(time);

  ctx.drawImage(
    digitsCanvas,
    0,
    0,
    canvas.width,
    canvas.height,
    0,
    0,
    width,
    height
  );
}


/* ========================================
   АНИМАЦИЯ
======================================== */

function animate(time) {
  const delta =
    Math.min(
      (time - lastTime) / 1000,
      0.05
    );

  lastTime = time;

  render(time, delta);

  requestAnimationFrame(animate);
}


/* ========================================
   ЗАПУСК
======================================== */

async function init() {
  try {
    await loadLogo();

    resizeCanvas();

    window.addEventListener(
      "resize",
      resizeCanvas
    );

    requestAnimationFrame(animate);

  } catch (error) {
    console.error(error);
  }
}

init();
</script>

</body>
</html>
